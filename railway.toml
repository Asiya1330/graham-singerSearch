[build]
buildCommand = "npm run build:server"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Set in Railway dashboard → Variables (recommended):
# SERVE_CLIENT=false
# NODE_ENV=production
# SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_DATABASE_URL, SESSION_SECRET, ADMIN_PASSWORD
